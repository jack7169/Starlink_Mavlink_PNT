[starlink]
# Starlink dish gRPC address (host:port)
dish_address = 192.168.100.1:9200
# Dish GPS mode: auto (keep current state), enable, or disable
gps_mode = auto

[mavlink]
# MAVLink connection string (protocol:host:port)
connection = udpin:0.0.0.0:14552
# Source system/component IDs for this sender
source_system = 242
source_component = 192
# Target autopilot system/component IDs
target_system = 2
target_component = 1

[thresholds]
# Maximum acceptable Starlink uncertainty (99% confidence, meters)
uncertainty_limit = 20.0
# Minimum seconds uncertainty must stay below limit before sending
min_stable_time = 3.0
# Accuracy jump that triggers an immediate correction (meters)
accuracy_jump_threshold = 1.5

[logging]
# Directory for CSV log files (must exist and be writable)
csv_dir = /root/starlink_logs
# Set to false to disable CSV logging (recommended on flash storage)
csv_enabled = true
# Maximum total size of CSV log folder in MB (oldest logs deleted to stay under limit)
max_log_size_mb = 100

[paths]
# Install root on the router
install_dir = /opt/starnav
# Path to starlink-grpc-tools relative to install_dir
grpc_tools_dir = starlink-grpc-tools
